{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Dashboard</title>
  <link rel="stylesheet" href="{% static 'frontend_app/style.css' %}"/>
</head>
<body>
<div class="dashboard">
  <nav class="navbar">
    <h2>User Dashboard</h2>
    <div style="display:flex;align-items:center;gap:16px">
      <span id="welcomeMsg"></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="content">
    <p class="section-title">All Products</p>
    <div id="productsGrid" class="products-grid"></div>
  </div>
</div>


<div class="modal-overlay" id="priceModal">
  <div class="modal">
    <h3>Edit Price</h3>
    <p style="font-size:13px;color:#6b7280;margin-bottom:12px">
      This price will be updated for all users.
    </p>
    <form onsubmit="savePrice(event)">
      <p id="currentPriceInfo" style="font-size:13px;color:#f59e0b;margin-bottom:4px"></p>
      <input type="number" id="newPrice" placeholder="New price" step="0.01" required oninput="validatePriceInput(this)"/>
      <p id="priceError" class="error" style="font-size:13px;margin-top:4px"></p>
      <div class="modal-btns">
        <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn-save">Update Price</button>
      </div>
    </form>
  </div>
</div>

<script>
  const API = '/api';
  const token = localStorage.getItem('token');
  const role = localStorage.getItem('role');

  if (!token || role !== 'user') window.location.href = '/';

  document.getElementById('welcomeMsg').textContent = 'Welcome, ' + localStorage.getItem('username');

  let editingId = null;
  let editingCurrentPrice = 0;

  function authHeaders() {
    return { 'Authorization': 'Token ' + token, 'Content-Type': 'application/json' };
  }

  async function loadProducts() {
    const res = await fetch(`${API}/products/`, { headers: authHeaders() });
    const data = await res.json();
    const grid = document.getElementById('productsGrid');
    if (!data.length) {
      grid.innerHTML = '<div class="empty-state">No products available yet.</div>';
      return;
    }
    grid.innerHTML = data.map(p => `
      <div class="product-card">
        <img src="${p.image_url || 'https://placehold.co/240x180?text=No+Image'}" alt="${p.name}"/>
        <div class="product-info">
          <h4>${p.name}</h4>
          <div class="seller-tag">by ${p.seller_name}</div>
          <div class="price-display">₹${p.display_price}</div>
          ${p.user_price ? `<div class="original-price">Original: ₹${p.original_price}</div>` : ''}
          <div class="action-btns">
            <button class="btn-price" onclick="openPriceEdit(${p.id}, ${p.display_price})">Edit Price</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function openPriceEdit(id, currentPrice) {
    editingId = id;
    editingCurrentPrice = currentPrice;
    const input = document.getElementById('newPrice');
    input.value = '';
    input.min = currentPrice;
    input.placeholder = `Must be greater than ₹${currentPrice}`;
    document.getElementById('currentPriceInfo').textContent = `Current price: ₹${currentPrice} — new price must be higher`;
    document.getElementById('priceModal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('priceModal').classList.remove('open');
    document.getElementById('priceError').textContent = '';
    editingId = null;
    editingCurrentPrice = 0;
  }

  function validatePriceInput(input) {
    const val = parseFloat(input.value);
    const err = document.getElementById('priceError');
    if (!isNaN(val) && val <= editingCurrentPrice) {
      err.textContent = `⚠️ Price must be greater than ₹${editingCurrentPrice}. You cannot decrease or keep the same price.`;
    } else {
      err.textContent = '';
    }
  }

  async function savePrice(e) {
    e.preventDefault();
    const user_price = parseFloat(document.getElementById('newPrice').value);
    if (user_price <= editingCurrentPrice) {
      document.getElementById('priceError').textContent = `Price must be greater than ₹${editingCurrentPrice}`;
      return;
    }
    const res = await fetch(`${API}/products/${editingId}/`, {
      method: 'PUT',
      headers: authHeaders(),
      body: JSON.stringify({ user_price })
    });
    const data = await res.json();
    if (res.ok) { closeModal(); loadProducts(); }
    else { document.getElementById('priceError').textContent = data.error || 'Failed to update price'; }
  }

  function logout() {
    localStorage.clear();
    window.location.href = '/';
  }

  loadProducts();
</script>
</body>
</html>
