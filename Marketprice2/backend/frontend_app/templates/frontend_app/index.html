{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Marketplace - Login</title>
  <link rel="stylesheet" href="{% static 'frontend_app/style.css' %}"/>
</head>
<body>
  <div class="auth-container">
    <h1>Marketplace</h1>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login', event)">Login</button>
      <button class="tab" onclick="switchTab('register', event)">Register</button>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <input type="text" id="loginUsername" placeholder="Username" required/>
      <input type="password" id="loginPassword" placeholder="Password" required/>
      <button type="submit">Login</button>
      <p id="loginError" class="error"></p>
    </form>

    <form id="registerForm" style="display:none" onsubmit="handleRegister(event)">
      <input type="text" id="regUsername" placeholder="Username" required/>
      <input type="password" id="regPassword" placeholder="Password" required/>
      <button type="submit">Register</button>
      <p id="regError" class="error"></p>
    </form>
  </div>

  <script>
    const API = '/api';

    
    if (localStorage.getItem('access')) window.location.href = '/dashboard/';

    function switchTab(tab, event) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('loginForm').style.display = tab === 'login' ? 'flex' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'flex' : 'none';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('loginUsername').value;
      const password = document.getElementById('loginPassword').value;
      const res = await fetch(`${API}/auth/login/`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username, password})
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('access', data.access);
        localStorage.setItem('refresh', data.refresh);
        localStorage.setItem('username', data.username);
        window.location.href = '/dashboard/';
      } else {
        document.getElementById('loginError').textContent = data.error || 'Login failed';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const username = document.getElementById('regUsername').value;
      const password = document.getElementById('regPassword').value;
      const res = await fetch(`${API}/auth/register/`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username, password})
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('access', data.access);
        localStorage.setItem('refresh', data.refresh);
        localStorage.setItem('username', data.username);
        window.location.href = '/dashboard/';
      } else {
        document.getElementById('regError').textContent = JSON.stringify(data);
      }
    }
  </script>
</body>
</html>
